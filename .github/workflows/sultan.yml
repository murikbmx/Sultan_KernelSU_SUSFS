name: Sultan
permissions:
  contents: write
  actions: write

on:
  workflow_call:
    inputs:
      codename:
        required: true
        type: string
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
  
jobs:
  build-kernel:
    runs-on: ubuntu-latest
    env:
      KERNEL_DIR: android_kernel_google_tensynos
    steps:
      - name: Maximize Build Space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-docker-images: 'true'
          verbose: 'true'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm sed hexedit curl wget libncurses-dev libssl-dev setup-config

      - name: Install Clang & LLVM
        run: |
          mkdir -p $GITHUB_WORKSPACE/clang
          cd $GITHUB_WORKSPACE/clang
          # Загружаем официальный Google Clang, который используется для ядер Android
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522817.tar.gz
          tar -xf clang-r522817.tar.gz

      - name: Clone Repositories
        run: |
          git clone https://github.com/TheWildJames/AnyKernel3.git -b "sultan-${{ inputs.codename }}"
          git clone https://github.com/TheWildJames/kernel_patches.git
          git clone https://github.com/kerneltoast/android_kernel_google_tensynos --depth=1

      - name: Add KernelSU
        run: |
          cd $KERNEL_DIR
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash -s wild

      - name: Apply KSU Hooks & Hide Stuff
        run: |
          cd $KERNEL_DIR
          # Использование -f (force), чтобы не падать, если патч частично применен
          cp ../kernel_patches/wild/hooks/syscall_hooks.patch ./
          patch -p1 --forward < syscall_hooks.patch || true
          
          cp ../kernel_patches/69_hide_stuff.patch ./
          patch -p1 --forward < 69_hide_stuff.patch || true

      - name: Build Kernel
        run: |
          cd $KERNEL_DIR
          
          # Настройка переменных окружения для Clang
          CLANG_BIN=$GITHUB_WORKSPACE/clang/bin
          export PATH="$CLANG_BIN:$PATH"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/clang/lib64:$LD_LIBRARY_PATH"
          
          # Параметры сборки
          MAKE_ARGS="
            ARCH=arm64 \
            O=out \
            CC=clang \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            LD=ld.lld \
            AR=llvm-ar \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            -j$(nproc --all)
          "
          
          # Настройка конфига
          make $MAKE_ARGS ${{ inputs.codename }}_defconfig
          
          # Включение нужных опций в .config напрямую
          echo "CONFIG_KSU=y" >> out/.config
          echo "CONFIG_LOCALVERSION=\"-Sultan-Wild\"" >> out/.config
          
          # Финальная компиляция
          make $MAKE_ARGS

      - name: Copy Images and DTBs
        run: |
          # В Tensynos с использованием O=out файлы лежат внутри out/
          cp $KERNEL_DIR/out/arch/arm64/boot/Image.lz4 ./AnyKernel3/Image.lz4 || cp $KERNEL_DIR/out/arch/arm64/boot/Image ./AnyKernel3/Image
          
          # Собираем все DTB
          find $KERNEL_DIR/out/arch/arm64/boot/dts/google/ -name "*.dtb" -exec cat {} + > ./AnyKernel3/dtb

      - name: Create ZIP
        run: |
          cd ./AnyKernel3
          ZIP_NAME="${{ inputs.codename }}_Sultan_Tensynos_KSU.zip"
          zip -r "../$ZIP_NAME" ./*
          
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ inputs.codename }}
          path: "*.zip"
