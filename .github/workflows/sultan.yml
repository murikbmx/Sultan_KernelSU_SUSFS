name: Sultan
permissions:
  contents: write
  actions: write

on:
  workflow_call:
    inputs:
      codename:
        required: true
        type: string
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
  
jobs:
  build-kernel:
    runs-on: ubuntu-latest
    env:
      KERNEL_DIR: android_kernel_google_tensynos
    steps:
      - name: Maximize Build Space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-swapfile: 'true'
          verbose: 'true'

      - name: Download and extract GCC 14.2.0 toolchain
        run: |
          wget https://www.kernel.org/pub/tools/crosstool/files/bin/x86_64/14.2.0/x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar.gz
          tar -xf x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar.gz

      - name: Clone Repositories
        run: |
          git clone https://github.com/TheWildJames/AnyKernel3.git -b "sultan-${{ inputs.codename }}"
          git clone https://github.com/TheWildJames/kernel_patches.git
          git clone https://github.com/kerneltoast/android_kernel_google_tensynos --depth=1

      - name: Add KernelSU
        run: |
          cd $KERNEL_DIR
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash -s wild

      - name: Apply KSU Hooks & Hide Stuff
        run: |
          cd $KERNEL_DIR
          # Apply syscall hooks
          cp ../kernel_patches/wild/hooks/syscall_hooks.patch ./
          patch -p1 -F 3 < syscall_hooks.patch
          # Apply Hide Stuff
          cp ../kernel_patches/69_hide_stuff.patch ./
          patch -p1 -F 3 < 69_hide_stuff.patch

      - name: Configure Defconfig
        run: |
          cd $KERNEL_DIR
          DEFCONFIG="./arch/arm64/configs/${{ inputs.codename }}_defconfig"
          
          # KernelSU Config
          echo "CONFIG_KSU=y" >> $DEFCONFIG
          echo "CONFIG_KSU_KPROBES_HOOK=n" >> $DEFCONFIG
          
          # Network & Optimizations
          echo "CONFIG_TMPFS_XATTR=y" >> $DEFCONFIG
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> $DEFCONFIG
          echo "CONFIG_IP_NF_TARGET_TTL=y" >> $DEFCONFIG
          echo "CONFIG_TCP_CONG_ADVANCED=y" >> $DEFCONFIG
          echo "CONFIG_TCP_CONG_BBR=y" >> $DEFCONFIG
          echo "CONFIG_NET_SCH_FQ=y" >> $DEFCONFIG
          
          # Localversion
          sed -i 's/CONFIG_LOCALVERSION="-Sultan"/CONFIG_LOCALVERSION="-Sultan-Wild"/' $DEFCONFIG

      - name: Build Kernel
        run: |
          cd $KERNEL_DIR
          export PATH=$GITHUB_WORKSPACE/gcc-14.2.0-nolibc/aarch64-linux/bin:$PATH
          make CROSS_COMPILE=aarch64-linux- CC=aarch64-linux-gcc -j$(nproc --all) ${{ inputs.codename }}_defconfig
          make CROSS_COMPILE=aarch64-linux- CC=aarch64-linux-gcc -j$(nproc --all)

      - name: Copy Images and DTBs
        run: |
          # Пути в Tensynos могут отличаться, адаптируем под стандартную структуру
          cp $KERNEL_DIR/arch/arm64/boot/Image.lz4 ./AnyKernel3/Image.lz4
          
          # Сборка DTB для конкретного устройства
          DTB_PATH="$KERNEL_DIR/arch/arm64/boot/dts/google/${{ inputs.codename }}"
          # Если путь выше не сработает (зависит от структуры Sultan), используем поиск:
          find $KERNEL_DIR/arch/arm64/boot/dts/ -name "*.dtb" -exec cat {} + > ./AnyKernel3/dtb

      - name: Create ZIP
        run: |
          cd ./AnyKernel3
          ZIP_NAME="${{ inputs.codename }}_Sultan_Tensynos_KSU.zip"
          zip -r "../$ZIP_NAME" ./*
          
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ inputs.codename }}
          path: "*.zip"
